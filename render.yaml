services:
  - type: web
    name: jarvis-app
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm ci
      npm run build
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 20.18.0
      - key: JARVIS_DEPLOYMENT_MODE
        value: cloud
